<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Resume Analyzer</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<style>
body {
  background: linear-gradient(135deg, #0B0E14, #111827);
  color: white;
  font-family: 'Inter', sans-serif;
}

/* Grid background */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: -1;
}

/* Glass effect */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* Glow */
.glow {
  box-shadow: 0 0 20px rgba(168,85,247,0.5);
}

/* Button */
.btn {
  background: linear-gradient(90deg, #3B82F6, #A855F7);
  transition: 0.3s;
}
.btn:hover {
  transform: scale(1.03);
  box-shadow: 0 0 25px rgba(168,85,247,0.8);
}

/* Hide sections */
.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- LANDING STATE -->
<div id="landing" class="p-6">

  <section class="text-center py-16">
    <h1 class="text-4xl font-bold mb-4">
      See how your resume
      <span class="text-blue-400">matches</span>
      <span class="text-purple-400">the job</span>
    </h1>
    <p class="text-gray-400">Upload your resume and analyze instantly</p>
  </section>

  <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-6">

    <!-- Upload -->
    <div class="glass p-6 glow text-center">
      <input type="file" id="pdfFile" accept="application/pdf" class="hidden">
      <label for="pdfFile" class="cursor-pointer block">
        <div class="text-purple-400 text-5xl mb-3">⬆️</div>
        <p id="fileName">Drop your resume here</p>
        <p id="fileStatus" class="text-sm text-gray-400 mt-1">PDF only</p>
      </label>
    </div>

    <!-- Job -->
    <div class="glass p-6">
      <textarea id="jobDesc"
        placeholder="Paste here..."
        class="w-full h-40 bg-black/30 p-3 rounded border border-gray-700"></textarea>
    </div>

  </div>

  <div class="max-w-4xl mx-auto mt-6">
    <button id="analyzeBtn"
      onclick="startAnalysis()"
      class="btn w-full py-3 rounded-lg font-semibold">
      Analyze match
    </button>
  </div>

</div>

<!-- RESULTS STATE -->
<div id="results" class="hidden p-6">

  <div class="max-w-5xl mx-auto">

    <!-- SCORE -->
    <div class="glass p-6 text-center mb-6">
      <h2 class="mb-4 text-xl">Match Score</h2>

      <div class="relative w-40 h-40 mx-auto">
        <svg class="w-full h-full">
          <circle cx="80" cy="80" r="70"
            stroke="#1f2937" stroke-width="10" fill="none"/>
          <circle id="progressCircle"
            cx="80" cy="80" r="70"
            stroke="#3B82F6"
            stroke-width="10"
            fill="none"
            stroke-dasharray="440"
            stroke-dashoffset="440"
            stroke-linecap="round"/>
        </svg>
        <div class="absolute inset-0 flex items-center justify-center text-xl">
          <span id="scoreText">0</span>/100
        </div>
      </div>

    </div>

    <!-- PROFILE -->
    <div id="candidateInfo" class="glass p-6 mb-6">
      <h3 class="mb-3 text-lg">Candidate Info</h3>
      <p>Name: N/A</p>
      <p>Title: N/A</p>
      <p>Experience: N/A</p>
      <p>Education: N/A</p>
    </div>

    <!-- GRID -->
    <div class="grid md:grid-cols-2 gap-6">

      <!-- Matched -->
      <div class="glass p-4">
        <h3 class="mb-2">Matched Skills</h3>
        <div id="matched" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Missing -->
      <div class="glass p-4">
        <h3 class="mb-2">Missing Skills</h3>
        <div id="missing" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- Strengths -->
      <div class="glass p-4">
        <h3>Strengths</h3>
        <ul id="strengths" class="list-disc ml-4"></ul>
      </div>

      <!-- Tips -->
      <div class="glass p-4">
        <h3>Improvement Tips</h3>
        <ul id="tips" class="list-disc ml-4"></ul>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
<script>
// File selection feedback
document.getElementById('pdfFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const fileName = document.getElementById('fileName');
  const fileStatus = document.getElementById('fileStatus');
  
  if (file) {
    fileName.innerText = file.name;
    fileName.classList.add('text-green-400');
    fileStatus.innerText = '✓ File selected';
  }
});
</script>

</body>
</html>
